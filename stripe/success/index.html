<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Pro — Phylasso</title>
  <meta name="theme-color" content="#080D14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080D14;
      --card:    #0F172A;
      --border:  #1E293B;
      --cyan:    #00E5FF;
      --text:    #F8FAFC;
      --text-2:  #CBD5E1;
      --text-3:  #94A3B8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: var(--cyan);
      color: #080D14;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-3);
    }

    /* ── Logo ── */
    .logo {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin-bottom: 32px;
    }
    .logo-shield {
      width: 60px; height: 60px; border-radius: 16px;
      background: linear-gradient(135deg, #00E5FF, #0090B8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 32px rgba(0,229,255,0.25), 0 6px 20px rgba(0,0,0,0.3);
    }
    .logo-wordmark {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 900; letter-spacing: 3px;
      color: var(--text-1);
    }
    .logo-wordmark span { color: var(--cyan); }

  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <div>
        <svg width="70" height="70" viewBox="0 0 72 85" fill="none">
          <path d="M36 2L4 13V40C4 59 36 82 36 82C36 82 68 59 68 40V13Z" fill="none" stroke="#00E5FF" stroke-width="1.3" opacity="0.85"/>
          <path d="M36 10L12 19V40C12 54 36 74 36 74C36 74 60 54 60 40V19Z" fill="rgba(212,175,55,0.04)" stroke="#FFFFFF" stroke-width="1" opacity="1"/>
          <circle cx="36" cy="41" r="13" fill="none" stroke="#00E5FF" stroke-width="0.9" opacity="0.7"/>
          <circle cx="36" cy="41" r="5.5" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.9"/>
          <circle cx="36" cy="41" r="2.5" fill="#00E5FF"/>
          <line x1="36" y1="25" x2="36" y2="33" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
          <line x1="36" y1="49" x2="36" y2="57" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
          <line x1="20" y1="41" x2="28" y2="41" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
          <line x1="44" y1="41" x2="52" y2="41" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>
        </svg>
      </div>
      <div class="logo-wordmark">PHYLA<span>SSO</span></div>
    </div>

    <h1>You're now on Pro</h1>
    <p>Thank you for upgrading. Your Pro features are active — unlimited AI plans, AI tips, and monthly preparedness reports are all ready to go.</p>
    <a href="https://www.phylasso.com" class="btn">Back to Phylasso</a>
    <p class="note">You can manage your subscription at any time from your profile in the app.</p>
  </div>
</body>
</html>
