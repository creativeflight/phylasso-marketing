<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Cancelled — Phylasso</title>
  <meta name="theme-color" content="#080D14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080D14;
      --card:    #0F172A;
      --border:  #1E293B;
      --cyan:    #00E5FF;
      --amber:   #FFB800;
      --text:    #F8FAFC;
      --text-2:  #CBD5E1;
      --text-3:  #94A3B8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: var(--cyan);
      color: #080D14;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-ghost {
      display: inline-block;
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-3);
      text-decoration: none;
    }
    .btn-ghost:hover { color: var(--text-2); }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">↩️</span>
    <h1>No problem</h1>
    <p>Your checkout was cancelled and you haven't been charged. You can upgrade to Pro any time from your profile in the app.</p>
    <a href="https://www.phylasso.com" class="btn">Back to Phylasso</a>
    <br>
    <a href="https://www.phylasso.com#features" class="btn-ghost">View Pro features →</a>
  </div>
</body>
</html>
